services:
  postgres:
    image: postgres:15-alpine
    container_name: bluesky-agent-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: bluesky_agent
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - coolify
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d bluesky_agent"]
      interval: 5s
      timeout: 5s
      retries: 5

  bluesky-agent:
    build: .
    container_name: bluesky-agent
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - BSKY_HANDLE=${BSKY_HANDLE}
      - BSKY_PASSWORD=${BSKY_PASSWORD}
      - DATABASE_URL=postgresql://user:password@postgres:5432/bluesky_agent
      - LLM_ENDPOINT=${LLM_ENDPOINT}
      - TZ=${TZ:-UTC}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./session.json:/app/session.json
    networks:
      - coolify
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:

networks:
  coolify:
    external: true