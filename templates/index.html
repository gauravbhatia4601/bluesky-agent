<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bluesky Agent Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f1419;
            --bg-secondary: #1c2732;
            --text-primary: #e7e9ea;
            --text-secondary: #8b98a5;
            --accent: #1d9bf0;
            --success: #00ba7c;
            --warning: #ffad1f;
            --danger: #f4212e;
        }
        
        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        
        .card {
            background-color: var(--bg-secondary);
            border: 1px solid #38444d;
            border-radius: 16px;
        }
        
        .card-header {
            border-bottom: 1px solid #38444d;
            padding: 16px 20px;
        }
        
        .stat-card {
            text-align: center;
            padding: 24px;
        }
        
        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent);
        }
        
        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        
        .reply-item {
            padding: 16px;
            border-bottom: 1px solid #38444d;
        }
        
        .reply-item:last-child {
            border-bottom: none;
        }
        
        .reply-text {
            color: var(--text-primary);
            line-height: 1.5;
        }
        
        .meta-text {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        
        .quality-badge {
            background-color: var(--success);
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
        }
        
        .pending-badge {
            background-color: var(--warning);
            color: black;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
        }
        
        .header-bar {
            background-color: var(--bg-secondary);
            padding: 16px 24px;
            border-bottom: 1px solid #38444d;
            margin-bottom: 24px;
        }
        
        .logo {
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--accent);
        }
        
        .refresh-btn {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
        }
        
        .refresh-btn:hover {
            background-color: #1a8cd8;
        }
        
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: var(--success);
            display: inline-block;
            margin-right: 6px;
        }
        
        .progress-bar {
            background-color: #38444d;
            border-radius: 8px;
            height: 8px;
            overflow: hidden;
        }
        
        .progress-fill {
            background-color: var(--accent);
            height: 100%;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="header-bar d-flex justify-content-between align-items-center">
        <div>
            <span class="logo">⚡ Bluesky Agent</span>
            <span class="status-dot ms-3"></span>
            <span class="meta-text">Running</span>
        </div>
        <div>
            <button class="refresh-btn" onclick="loadData()">
                Refresh
            </button>
        </div>
    </div>
    
    <div class="container">
        <!-- Stats Row -->
        <div class="row mb-4">
            <div class="col-md-3">
                <div class="card stat-card">
                    <div class="stat-number" id="pending-count">-</div>
                    <div class="stat-label">Pending Queue</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stat-card">
                    <div class="stat-number" id="posted-today">-</div>
                    <div class="stat-label">Posted Today</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stat-card">
                    <div class="stat-number" id="remaining">-</div>
                    <div class="stat-label">Remaining Today</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stat-card">
                    <div class="stat-number" id="avg-quality">-</div>
                    <div class="stat-label">Avg Quality</div>
                </div>
            </div>
        </div>
        
        <!-- Progress Bar -->
        <div class="card mb-4 p-4">
            <div class="d-flex justify-content-between mb-2">
                <span>Daily Limit Usage</span>
                <span id="progress-text">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
            </div>
        </div>
        
        <!-- Pending Queue -->
        <div class="card mb-4">
            <div class="card-header">
                <h5 class="mb-0">Pending Queue</h5>
            </div>
            <div id="queue-list">
                <div class="text-center p-4 meta-text">Loading...</div>
            </div>
        </div>
        
        <!-- Recent Replies -->
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">Recent Replies</h5>
            </div>
            <div id="replies-list">
                <div class="text-center p-4 meta-text">Loading...</div>
            </div>
        </div>
    </div>
    
    <script>
        async function loadData() {
            try {
                // Load stats
                const statsRes = await fetch('/api/status');
                const stats = await statsRes.json();
                
                document.getElementById('pending-count').textContent = stats.stats.pending_queue;
                document.getElementById('posted-today').textContent = stats.stats.posted_today;
                document.getElementById('remaining').textContent = stats.stats.remaining_today;
                document.getElementById('avg-quality').textContent = stats.stats.metrics.avg_quality;
                
                // Update progress
                const posted = stats.stats.posted_today;
                const limit = stats.stats.daily_limit;
                const percent = Math.min(100, (posted / limit) * 100);
                document.getElementById('progress-fill').style.width = percent + '%';
                document.getElementById('progress-text').textContent = Math.round(percent) + '%';
                
                // Load queue
                const queueRes = await fetch('/api/queue');
                const queue = await queueRes.json();
                
                const queueEl = document.getElementById('queue-list');
                if (queue.queue.length === 0) {
                    queueEl.innerHTML = '<div class="text-center p-4 meta-text">No pending replies</div>';
                } else {
                    queueEl.innerHTML = queue.queue.map(item => `
                        <div class="reply-item">
                            <div class="d-flex justify-content-between align-items-start">
                                <div>
                                    <span class="pending-badge">Pending</span>
                                    <span class="meta-text ms-2">@${item.post_author}</span>
                                </div>
                                <span class="meta-text">${new Date(item.created_at).toLocaleTimeString()}</span>
                            </div>
                            <div class="reply-text mt-2">${escapeHtml(item.reply_text)}</div>
                            <div class="meta-text mt-2">Replying to: "${escapeHtml(item.post_text.substring(0, 80))}..."</div>
                        </div>
                    `).join('');
                }
                
                // Load recent replies
                const repliesRes = await fetch('/api/replies');
                const replies = await repliesRes.json();
                
                const repliesEl = document.getElementById('replies-list');
                if (replies.replies.length === 0) {
                    repliesEl.innerHTML = '<div class="text-center p-4 meta-text">No recent replies</div>';
                } else {
                    repliesEl.innerHTML = replies.replies.map(item => `
                        <div class="reply-item">
                            <div class="d-flex justify-content-between align-items-start">
                                <div>
                                    <span class="quality-badge">Score: ${item.quality_score}</span>
                                    <span class="meta-text ms-2">@${item.post_author}</span>
                                </div>
                                <span class="meta-text">${item.posted_at ? new Date(item.posted_at).toLocaleTimeString() : '-'}</span>
                            </div>
                            <div class="reply-text mt-2">${escapeHtml(item.reply_text)}</div>
                            <div class="meta-text mt-2">❤️ ${item.likes}</div>
                        </div>
                    `).join('');
                }
                
            } catch (error) {
                console.error('Failed to load data:', error);
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Load data on page load
        loadData();
        
        // Refresh every 30 seconds
        setInterval(loadData, 30000);
    </script>
</body>
</html>
